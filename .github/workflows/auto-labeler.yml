name: Auto Labeler

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  labeler:
    name: Auto Classify & Label
    runs-on: ubuntu-latest
    steps:
      - name: Label PR based on file changes and keywords
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const labels = new Set();
            // PRs always need a review review when opened
            labels.add('review');

            for (const file of files) {
              const path = file.filename;
              if (path.startsWith('app/') || path.startsWith('components/') || path.startsWith('public/')) {
                labels.add('frontend');
              }
              if (path.startsWith('lib/') || path.endsWith('.sql')) {
                labels.add('backend');
              }
              if (path.endsWith('.md') || path.startsWith('docs/')) {
                labels.add('docs');
              }
            }

            // Keyword check for PR
            const title = (context.payload.pull_request.title || '').toLowerCase();
            const body = (context.payload.pull_request.body || '').toLowerCase();
            if (title.includes('bug') || body.includes('bug') || title.includes('fix') || body.includes('fix')) {
              labels.add('bug');
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: Array.from(labels)
              });
              console.log(`Labeled PR #${context.payload.pull_request.number} with labels: ${Array.from(labels).join(', ')}`);
            }

      - name: Label Issue based on keywords
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const title = (context.payload.issue.title || '').toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();

            const labels = [];

            if (title.includes('bug') || body.includes('bug')) {
              labels.push('bug');
            }
            if (title.includes('frontend') || body.includes('frontend') || title.includes('ui') || body.includes('ui') || title.includes('css')) {
              labels.push('frontend');
            }
            if (title.includes('backend') || body.includes('backend') || title.includes('db') || title.includes('database') || title.includes('supabase')) {
              labels.push('backend');
            }
            if (title.includes('doc') || body.includes('doc') || title.includes('readme') || body.includes('readme')) {
              labels.push('docs');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
              console.log(`Labeled Issue #${context.payload.issue.number} with labels: ${labels.join(', ')}`);
            }

  conflict:
    name: Conflict Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Check for merge conflicts
        uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: "merge conflict"
          repoToken: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
