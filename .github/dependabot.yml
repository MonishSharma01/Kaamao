version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    groups:
      # Auto-group minor and patch updates together to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    ignore:
      # Don't auto-update major versions — review those manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    labels:
      - dependencies
      - github-actions
